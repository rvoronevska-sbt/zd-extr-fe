<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Zendesk Ticket Extractor</title>
	<meta name="description" content="Zendesk Ticket Extractor is a tool to extract and visualize data from Zendesk.">
	<link rel="canonical" href="https://rvoronevska.github.io/zd-extr-fe/">

	<!-- Icons -->
	<link rel="icon" type="image/png" href="assets/favicons/favicon-96x96.png" sizes="96x96" loading="lazy">
	<link rel="icon" type="image/svg+xml" href="assets/favicons/favicon.svg" loading="lazy">
	<link rel="shortcut icon" href="assets/favicons/favicon.ico" loading="lazy">
	<link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png" loading="lazy">

	<!-- Preload Google Font (async load) -->
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="preload" href="https://fonts.gstatic.com/s/lato/v25/S6u9w4BMUTPHh6UVSwiPGQ3q5d0.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="https://fonts.googleapis.com/css2?family=Lato:wght@500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">

	<!-- Preload Critical Above-Fold Images -->
	<link rel="preload" href="src/assets/logo-light.svg" as="image" type="image/svg+xml" fetchpriority="high">

	<!-- Noscript Fallback for Font -->
	<noscript>
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@500;600;700&display=swap">
	</noscript>
</head>

<body>
	<div id="app"></div>
	<script type="module" src="/src/main.js" defer></script>
</body>

</html>
